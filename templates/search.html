<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Prompts</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
        }

        .navbar {
            background-color: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
            color: #c9d1d9;
        }

        .nav-links a {
            color: #c9d1d9;
            text-decoration: none;
            margin-left: 20px;
            font-size: 14px;
        }

        .nav-links a:hover {
            color: #58a6ff;
        }

        .container {
            max-width: 900px;
            margin: 50px auto;
            padding: 0 20px;
        }

        .card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
        }

        h1 {
            margin-bottom: 10px;
            font-size: 32px;
        }

        .sub-text {
            color: #8b949e;
            margin-bottom: 25px;
            font-size: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #c9d1d9;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #30363d;
            border-radius: 8px;
            background-color: #0d1117;
            color: #e6edf3;
            margin-bottom: 18px;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #58a6ff;
        }

        button {
            background-color: #238636;
            color: white;
            border: none;
            padding: 12px 22px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover {
            background-color: #2ea043;
        }

        .results-box {
            margin-top: 30px;
            background-color: #0d1117;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 20px;
        }

        .results-box h3 {
            margin-bottom: 12px;
            font-size: 20px;
        }

        .placeholder {
            color: #8b949e;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">PromptShare</div>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="search.html">Search</a>
            <a href="optimise.html">Optimise</a>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <h1>Search Prompts</h1>
            <p class="sub-text">Find prompts by entering a keyword below.</p>

            <form method="GET">
                <label for="query">Enter keyword</label>
                <input type="text" id="query" name="query" placeholder="Example: python, resume, AI tools">
                <button type="submit">Search</button>
            </form>

            <div class="results-box">
                <h3>Results</h3>
                <p class="placeholder">No results yet. Matching prompts will appear here later.</p>
            </div>
        </div>
    </div>

</body>
</html>
