<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PromptShare | Sign In</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" href="{{ url_for('main.index') }}">PromptShare</a>
      <nav class="nav-links" aria-label="Primary navigation">
        <a class="nav-link" href="{{ url_for('main.index') }}">Home</a>
        <a class="nav-link" href="./search.html">Search</a>
        <a class="nav-link" href="./optimise.html">Optimise</a>
        <a class="nav-link" href="./dashboard.html">Dashboard</a>
        <a class="nav-link" href="./add-prompt.html">Add Prompt</a>
        <a class="nav-link active" href="{{ url_for('auth.login') }}">Sign In</a>
        <a class="btn btn-primary mini" href="{{ url_for('auth.register') }}">Get Started</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="auth-wrap card" aria-labelledby="login-heading">
      <h1 id="login-heading" style="text-align:center;margin-top:0">Welcome Back</h1>
      <p class="muted" style="text-align:center">Sign in to ask questions, post answers, and vote on prompt threads.</p>

      <form id="login-form" action="{{ url_for('auth.login') }}" method="POST" novalidate style="display:grid;gap:0.8rem">
        <div class="field-group">
          <label for="login-identifier" class="visually-hidden">Username or email</label>
          <input class="field" type="text" id="login-identifier" name="identifier"
                 placeholder="Username or email" required
                 autocomplete="username">
        </div>

        <div class="field-group">
          <label for="login-password" class="visually-hidden">Password</label>
          <div class="field-with-toggle">
            <input class="field" type="password" id="login-password" name="password"
                   placeholder="Password" required
                   autocomplete="current-password">
            <button type="button" class="toggle-visibility" data-toggle-target="login-password"
                    aria-label="Show password" aria-pressed="false">Show</button>
          </div>
        </div>

        <div class="login-row">
          <label class="checkbox-inline mini">
            <input type="checkbox" id="remember-me" name="remember">
            <span>Remember me</span>
          </label>
          <a href="#" class="mini forgot-link">Forgot password?</a>
        </div>

        <button class="btn btn-primary" type="submit">Enter PromptShare</button>
      </form>

      <p class="mini muted" style="margin-top:1rem;text-align:center">
        No account? <a href="{{ url_for('auth.register') }}" style="color:#7fb5ff">Create one</a>
      </p>
    </section>
  </main>

  <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
