<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Server Communication Demo</title>
        <link rel="stylesheet" href="style.css" />
    </head>

    <body>
        <header>
            <h1>Communicating with a Server</h1>
            <p>Async JavaScript, Fetch API, HTTP, JSON</p>
        </header>

        <main>
            <section>
                <h2>GET request (load data)</h2>
                <button id="loadBtn">Load posts</button>
                <button id="clearBtn">Clear</button>
                <p id="getStatus"></p>
                <div id="posts"></div>
            </section>

            <section>
                <h2>POST request (send data)</h2>

                <input id="title" type="text" placeholder="Title" />
                <textarea id="body" placeholder="Body"></textarea>

                <button id="postBtn">Send</button>

                <p id="postStatus"></p>
                <pre id="postResponse">No response yet.</pre>
            </section>

            <section>
                <h2>Async behaviour demo</h2>
                <button id="asyncBtn">Run example</button>
                <pre id="timingOutput">No output yet.</pre>
            </section>
        </main>

        <script src="app.js"></script>
    </body>
</html>
