<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PromptShare | Sign Up</title>
  <link rel="stylesheet" href="./assets/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" href="./index.html">PromptShare</a>
      <nav class="nav-links">
        <a class="nav-link" href="./index.html">Home</a>
        <a class="nav-link" href="./explore.html">Explore</a>
        <a class="nav-link" href="./login.html">Sign In</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="auth-wrap card">
      <h1 style="text-align:center;margin-top:0">Join PromptShare</h1>
      <p class="muted" style="text-align:center">Create an account to ask prompt questions and contribute answers.</p>
      <form action="./dashboard.html" method="get" style="display:grid;gap:0.8rem">
        <input class="field" type="text" name="displayName" placeholder="Display Name" required>
        <input class="field" type="email" name="email" placeholder="Work Email" required>
        <input class="field" type="password" name="password" placeholder="Password" required>
        <button class="btn btn-primary" type="submit">Create Community Account</button>
      </form>
      <p class="mini muted" style="margin-top:1rem">Already registered? <a href="./login.html" style="color:#7fb5ff">Sign in</a></p>
    </section>
  </main>
</body>
</html>
