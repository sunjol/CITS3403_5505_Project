<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PromptShare | Sign Up</title>
  <link rel="stylesheet" href="./assets/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" href="./index.html">PromptShare</a>
      <nav class="nav-links">
        <a class="nav-link" href="./index.html">Home</a>
        <a class="nav-link" href="./explore.html">Explore</a>
        <a class="nav-link" href="./login.html">Sign In</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="auth-wrap card">
      <h1 style="text-align:center;margin-top:0">Join PromptShare</h1>
      <p class="muted" style="text-align:center">Create an account to ask prompt questions and contribute answers.</p>

      <form id="signup-form" action="/signup" method="POST" novalidate style="display:grid;gap:0.8rem">

        <div>
          <input class="field" type="text" id="username" name="username"
                 placeholder="Username (e.g. prompt_master)" required minlength="3" maxlength="20"
                 autocomplete="username">
          <p class="mini muted" style="margin:0.3rem 0 0">3-20 characters, letters, numbers and underscores only.</p>
        </div>

        <div>
          <input class="field" type="email" id="email" name="email"
                 placeholder="you@example.com" required
                 autocomplete="email">
        </div>

        <div>
          <input class="field" type="password" id="password" name="password"
                 placeholder="Password (minimum 8 characters)" required minlength="8"
                 autocomplete="new-password">
          <p class="mini muted" style="margin:0.3rem 0 0">At least 8 characters with a mix of letters and numbers.</p>
        </div>

        <div>
          <input class="field" type="password" id="confirm-password" name="confirm_password"
                 placeholder="Confirm password" required
                 autocomplete="new-password">
        </div>

        <button class="btn btn-primary" type="submit">Create Community Account</button>
      </form>

      <p class="mini muted" style="margin-top:1rem;text-align:center">
        Already registered? <a href="./login.html" style="color:#7fb5ff">Sign in</a>
      </p>
    </section>
  </main>

  <script src="./assets/auth.js"></script>
</body>
</html>
