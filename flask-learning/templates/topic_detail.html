{% extends "base.html" %}
{% block title %}{{ topic.title }} | Flask Learning Site{% endblock %}

{% block content %}
<section class="section narrow">
    <p class="eyebrow">{{ topic.category }}</p>
    <h1>{{ topic.title }}</h1>
    <p class="lead">{{ topic.summary }}</p>
    <div class="info-box">
        <strong>Checkpoint:</strong> {{ topic.checkpoint }}
    </div>
    <p><a href="{{ url_for('concepts') }}">Back to concepts</a></p>
</section>
{% endblock %}
